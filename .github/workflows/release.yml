name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.0.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid release tag: $tag"
            echo "Use a semantic version tag like v1.0.0 or v1.1.0-beta.1."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Verify project version
        shell: bash
        run: |
          project_version="$(./gradlew -q printVersion)"
          release_version="${{ steps.release.outputs.version }}"

          if [ "$project_version" != "$release_version" ]; then
            echo "Release tag version ($release_version) does not match Gradle project version ($project_version)."
            exit 1
          fi

      - name: Verify plugin annotation version
        shell: bash
        run: |
          project_version="$(./gradlew -q printVersion)"
          plugin_version="$(grep -oP 'version\s*=\s*"\K[^"]+' src/main/java/io/github/hanielcota/motdguard/MotdGuardPlugin.java | head -1)"

          if [ "$plugin_version" != "$project_version" ]; then
            echo "@Plugin version ($plugin_version) does not match Gradle project version ($project_version)."
            exit 1
          fi

      - name: Build release artifact
        # Full build including SpotBugs/FindSecBugs so the released artifact is security-scanned.
        run: ./gradlew build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: MotdGuard ${{ steps.release.outputs.tag }}
          files: build/libs/*.jar
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(steps.release.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

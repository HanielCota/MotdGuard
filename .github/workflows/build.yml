name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build
        # Runs the full build including SpotBugs/FindSecBugs (wired into the `check` task).
        # Security findings from FindSecBugs fail the build; do not exclude spotbugs* tasks here.
        run: ./gradlew build

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-report
          path: build/reports/spotbugs.html
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: MotdGuard
          path: build/libs/*.jar
          retention-days: 30

[motd]
line1 = "<#00FF00>MeuServidor"
line2 = "<#FFFFFF>Modo Hardcore Ativo"

[maintenance]
enabled = false
kick-message = "<red>Servidor em manutenção. Volte em breve!"
motd-line1 = "<#00FF00>MeuServidor"
motd-line2 = "<red>Em manutenção. Volte em breve!"

[rate-limit]
enabled = true
max-pings-per-minute = 60
block-message = "Muitas requisições. Aguarde."

[cooldown]
enabled = true
duration-seconds = 60

[messages]
reload-success = "<green>Configuration reloaded successfully."
reload-failure = "<red>Failed to reload configuration. Check console."
maintenance-enabled = "<green>Maintenance mode enabled."
maintenance-disabled = "<green>Maintenance mode disabled."
maintenance-toggled = "<green>Maintenance mode {status}."
maintenance-status-enabled = "enabled"
maintenance-status-disabled = "disabled"
help-header = "<green>MotdGuard Commands:"
help-reload = "<yellow>/motdguard reload - Reload configuration"
help-maintenance = "<yellow>/motdguard maintenance - Toggle maintenance mode"
help-maintenance-on = "<yellow>/motdguard maintenance on - Enable maintenance"
help-maintenance-off = "<yellow>/motdguard maintenance off - Disable maintenance"
cooldown-message = "<red>Aguarde antes de usar outro comando."
